{% extends "base.html" %}
{% block content %}

<h2 class="mb-4">✏️ Edit Class</h2>

<div class="card card-glass p-4" style="max-width:600px;">
    <form method="POST">
        <div class="mb-3">
            <label class="form-label">Room</label>
            <select name="room_id" class="form-select bg-transparent text-white border-secondary" required>
                {% for r in rooms %}
                    <option value="{{ r.id }}" {% if r.id == schedule.room_id %}selected{% endif %}>
                        {{ r.name }} ({{ r.level }})
                    </option>
                {% endfor %}
            </select>
        </div>

        <div class="mb-3">
            <label class="form-label">Day</label>
            <select name="day" class="form-select bg-transparent text-white border-secondary" required>
                {% for day in ['Monday', 'Tuesday', 'Wednesday', 'Thursday', 'Friday', 'Saturday', 'Sunday'] %}
                    <option value="{{ day }}" {% if day == schedule.day %}selected{% endif %}>{{ day }}</option>
                {% endfor %}
            </select>
        </div>

        <div class="row">
            <div class="col-6 mb-3">
                <label class="form-label">Start Time</label>
                <input type="time" name="start_time" class="form-control bg-transparent text-white border-secondary"
                       value="{{ schedule.start_time }}" required>
            </div>
            <div class="col-6 mb-3">
                <label class="form-label">End Time</label>
                <input type="time" name="end_time" class="form-control bg-transparent text-white border-secondary"
                       value="{{ schedule.end_time }}" required>
            </div>
        </div>

        <div class="mb-3">
            <label class="form-label">Course Name</label>
            <input name="course_name" class="form-control bg-transparent text-white border-secondary"
                   value="{{ schedule.course_name }}" required>
        </div>

        <div class="mb-4">
            <label class="form-label">Professor Name</label>
            <input name="professor_name" class="form-control bg-transparent text-white border-secondary"
                   value="{{ schedule.professor_name or '' }}">
        </div>

        <div class="d-flex gap-2">
            <button type="submit" class="btn btn-primary">Update</button>
            <a href="/schedule" class="btn btn-secondary">Cancel</a>
        </div>
    </form>
</div>

{% endblock %}
