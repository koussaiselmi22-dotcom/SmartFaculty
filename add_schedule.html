{% extends "base.html" %}
{% block content %}

<h2 class="mb-4">➕ Add Class to Schedule</h2>

<div class="card card-glass p-4" style="max-width:600px;">
    <form method="POST">
        <div class="mb-3">
            <label class="form-label">Room</label>
            <select name="room_id" class="form-select bg-transparent text-white border-secondary" required>
                <option value="">Select Room</option>
                {% for r in rooms %}
                    <option value="{{ r.id }}">{{ r.name }} ({{ r.level }})</option>
                {% endfor %}
            </select>
        </div>

        <div class="mb-3">
            <label class="form-label">Day</label>
            <select name="day" class="form-select bg-transparent text-white border-secondary" required>
                <option value="Monday">Monday</option>
                <option value="Tuesday">Tuesday</option>
                <option value="Wednesday">Wednesday</option>
                <option value="Thursday">Thursday</option>
                <option value="Friday">Friday</option>
                <option value="Saturday">Saturday</option>
                <option value="Sunday">Sunday</option>
            </select>
        </div>

        <div class="row">
            <div class="col-6 mb-3">
                <label class="form-label">Start Time</label>
                <input type="time" name="start_time" class="form-control bg-transparent text-white border-secondary" required>
            </div>
            <div class="col-6 mb-3">
                <label class="form-label">End Time</label>
                <input type="time" name="end_time" class="form-control bg-transparent text-white border-secondary" required>
            </div>
        </div>

        <div class="mb-3">
            <label class="form-label">Course Name</label>
            <input name="course_name" class="form-control bg-transparent text-white border-secondary"
                   placeholder="e.g. Algorithms" required>
        </div>

        <div class="mb-4">
            <label class="form-label">Professor Name <span class="text-white-50">(optional)</span></label>
            <input name="professor_name" class="form-control bg-transparent text-white border-secondary"
                   placeholder="e.g. Dr. Ahmed">
        </div>

        <div class="d-flex gap-2">
            <button type="submit" class="btn btn-success">Save</button>
            <a href="/schedule" class="btn btn-secondary">Cancel</a>
        </div>
    </form>
</div>

{% endblock %}
