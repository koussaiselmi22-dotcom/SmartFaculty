<!DOCTYPE html>
<html>
<head>
    <title>Register – SmartFaculty</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        .card-glass {
            background: rgba(255,255,255,0.08);
            border: 1px solid rgba(255,255,255,0.15);
            border-radius: 15px;
            backdrop-filter: blur(10px);
            color: white;
        }
        .form-control::placeholder { color: rgba(255,255,255,0.4); }
        .form-control:focus {
            background: rgba(255,255,255,0.1);
            color: white;
            border-color: #6366f1;
            box-shadow: 0 0 0 0.2rem rgba(99,102,241,0.25);
        }
    </style>
</head>
<body class="d-flex justify-content-center align-items-center flex-column"
      style="min-height:100vh; background:#0f172a;">

    {% with messages = get_flashed_messages(with_categories=true) %}
        {% if messages %}
            <div style="width:350px;" class="mb-3">
                {% for cat, msg in messages %}
                    <div class="alert alert-{{ cat }} py-2">{{ msg }}</div>
                {% endfor %}
            </div>
        {% endif %}
    {% endwith %}

    <div class="card p-4 card-glass" style="width:350px;">
        <h3 class="text-center mb-4">🎓 Register</h3>
        <form method="POST">
            <input class="form-control mb-2 bg-transparent text-white border-secondary"
                   name="name" placeholder="Full Name" required>
            <input class="form-control mb-2 bg-transparent text-white border-secondary"
                   name="email" placeholder="Email" type="email" required>
            <input class="form-control mb-3 bg-transparent text-white border-secondary"
                   name="password" type="password" placeholder="Password" required>
            <button class="btn btn-success w-100" type="submit">Create Account</button>
        </form>
        <p class="text-center mt-3 mb-0" style="color:rgba(255,255,255,0.5);">
            Already have an account? <a href="/login" class="text-info">Login</a>
        </p>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
