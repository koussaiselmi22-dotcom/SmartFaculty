{% extends "base.html" %}
{% block content %}

<h2 class="mb-4">📸 Verify Your Student Card</h2>

<div class="card card-glass p-4" style="max-width:600px;">
    <p class="text-white-50 mb-3">Please upload a photo of your student card to verify your level.</p>
    
    <form method="POST" enctype="multipart/form-data" id="verifyForm">
        <div class="mb-3">
            <label class="form-label">Student Card Image</label>
            <input type="file" name="card_image" class="form-control bg-transparent text-white border-secondary" accept="image/*" capture="environment" required>
        </div>
        
        <div id="ocrResult" class="alert d-none"></div>
        
        <div class="d-flex gap-2">
            <button type="submit" class="btn btn-pro">✅ Verify</button>
            <a href="/rooms" class="btn btn-secondary">Cancel</a>
        </div>
    </form>
</div>

<script src="https://cdn.jsdelivr.net/npm/tesseract.js@5/dist/tesseract.min.js"></script>
<script>
document.getElementById('verifyForm').addEventListener('submit', async function(e) {
    e.preventDefault();
    
    const fileInput = document.querySelector('input[name="card_image"]');
    const file = fileInput.files[0];
    
    if (!file) {
        alert('Please select an image');
        return;
    }
    
    const resultDiv = document.getElementById('ocrResult');
    resultDiv.className = 'alert alert-info';
    resultDiv.textContent = '⏳ Reading card...';
    resultDiv.classList.remove('d-none');
    
    try {
        const image = new Image();
        image.src = URL.createObjectURL(file);
        
        const result = await Tesseract.recognize(image, 'ara+eng', {
            logger: (m) => console.log(m)
        });
        
        const text = result.data.text;
        console.log('Extracted:', text);
        
        // Extract level (L1, L2, L3, M1, M2)
        const levelMatch = text.match(/(L[1-3]|M[1-2])/i);
        const extractedLevel = levelMatch ? levelMatch[0].toUpperCase() : null;
        
        if (extractedLevel) {
            // Send to server
            const formData = new FormData();
            formData.append('card_image', file);
            formData.append('extracted_level', extractedLevel);
            
            const response = await fetch('/verify_card/{{ room_id }}', {
                method: 'POST',
                body: formData
            });
            
            if (response.ok) {
                window.location.href = '/room/{{ room_id }}';
            } else {
                const msg = await response.text();
                resultDiv.className = 'alert alert-danger';
                resultDiv.textContent = '❌ ' + msg;
            }
        } else {
            resultDiv.className = 'alert alert-warning';
            resultDiv.textContent = '⚠️ Could not detect level from card. Please try again with a clearer image.';
        }
    } catch (err) {
        resultDiv.className = 'alert alert-danger';
        resultDiv.textContent = '❌ Error reading card: ' + err.message;
    }
});
</script>

{% endblock %}
