{% extends "base.html" %}
{% block content %}

<h2 class="mb-4">➕ Add Room</h2>

<div class="card card-glass p-4" style="max-width:500px;">
    <form method="POST">

        <div class="mb-3">
            <label class="form-label">Room Name</label>
            <input class="form-control bg-transparent text-white border-secondary"
                   name="name" placeholder="e.g. Maths L1" required>
        </div>

        <div class="mb-3">
            <label class="form-label">Level</label>
            <select name="level" class="form-select bg-transparent text-white border-secondary">
                <option value="L1">L1</option>
                <option value="L2">L2</option>
                <option value="L3">L3</option>
                <option value="M1">M1</option>
                <option value="M2">M2</option>
            </select>
        </div>

        <div class="mb-4">
            <label class="form-label">Description</label>
            <textarea class="form-control bg-transparent text-white border-secondary"
                      name="description" placeholder="Room description..." rows="3"></textarea>
        </div>

        <div class="d-flex gap-2">
            <button class="btn btn-success" type="submit">Save</button>
            <a href="/rooms" class="btn btn-secondary">Cancel</a>
        </div>

    </form>
</div>

{% endblock %}
