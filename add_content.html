{% extends "base.html" %}
{% block content %}

<h2 class="mb-4">➕ Add Content</h2>

<div class="card card-glass p-4" style="max-width:600px;">
    <form method="POST" enctype="multipart/form-data">

        <div class="mb-3">
            <label class="form-label">Title</label>
            <input name="title" class="form-control bg-transparent text-white border-secondary"
                   placeholder="Content title" required>
        </div>

        <div class="mb-3">
            <label class="form-label">Type</label>
            <select name="type" class="form-select bg-transparent text-white border-secondary">
                <option value="cours">📚 Cours</option>
                <option value="td">📝 TD</option>
                <option value="exam">📄 Exam</option>
            </select>
        </div>

        <div class="mb-3">
            <label class="form-label">Text Content</label>
            <textarea name="content" class="form-control bg-transparent text-white border-secondary"
                      placeholder="Description or notes..." rows="4"></textarea>
        </div>

        <div class="mb-4">
            <label class="form-label">File <span class="text-white-50">(optional)</span></label>
            <input type="file" name="file" class="form-control bg-transparent text-white border-secondary">
        </div>

        <div class="d-flex gap-2">
            <button type="submit" class="btn btn-success">Save</button>
            <a href="/room/{{ room_id }}" class="btn btn-secondary">Cancel</a>
        </div>

    </form>
</div>

{% endblock %}
